<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SHATTER – Sir Ronny Smart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root { --red: #ff2d2d; --dark: #080808; }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    touch-action: none;
    user-select: none;
  }

  /* LANDING */
  #landing {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; z-index: 100;
    background: radial-gradient(ellipse at 50% 25%, #200000 0%, #080808 65%);
  }

  #landing::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(125deg, transparent 49%, rgba(255,45,45,0.06) 49%, rgba(255,45,45,0.06) 51%, transparent 51%),
      linear-gradient(55deg,  transparent 49%, rgba(255,45,45,0.04) 49%, rgba(255,45,45,0.04) 51%, transparent 51%);
    background-size: 55px 55px;
    pointer-events: none;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 18vw, 100px);
    color: #fff; letter-spacing: 6px;
    line-height: 1; text-align: center;
  }
  .logo span { color: var(--red); }

  .tagline {
    font-size: 13px; color: rgba(255,255,255,0.4);
    text-align: center; max-width: 260px; line-height: 1.7;
  }

  #upload-zone {
    position: relative;
    width: min(320px, 88vw);
    border: 2px dashed rgba(255,45,45,0.4);
    border-radius: 20px; padding: 36px 24px;
    display: flex; flex-direction: column;
    align-items: center; gap: 14px; cursor: pointer;
    background: rgba(255,45,45,0.04);
    transition: border-color 0.2s, background 0.2s;
  }
  #upload-zone:active { border-color: var(--red); background: rgba(255,45,45,0.1); }
  #upload-zone .icon  { font-size: 52px; line-height: 1; }
  #upload-zone .label { font-size: 16px; font-weight: 600; color: white; text-align: center; }
  #upload-zone .sub   { font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; line-height: 1.6; }

  #file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }

  .hint-bottom {
    font-size: 11px; color: rgba(255,255,255,0.18);
    text-align: center; max-width: 240px; line-height: 1.7;
  }

  /* CANVAS */
  #physics-canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: none; touch-action: none; }

  /* HUD */
  #hud {
    position: fixed; bottom: 28px; left: 0; right: 0;
    display: none; flex-direction: row;
    justify-content: center; gap: 10px; z-index: 200; padding: 0 16px;
  }

  .hud-btn {
    background: rgba(20,20,20,0.88);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    color: white; border-radius: 50px;
    padding: 13px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    flex: 1; max-width: 120px; text-align: center;
  }
  .hud-btn:active { transform: scale(0.94); background: rgba(60,60,60,0.9); }
  .hud-btn.red { background: rgba(255,45,45,0.25); border-color: rgba(255,45,45,0.35); }
  .hud-btn.red:active { background: rgba(255,45,45,0.5); }

  /* FLASH */
  #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 9999; }

  /* TOAST */
  #toast {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
    color: white; font-size: 12px; font-weight: 500;
    padding: 9px 20px; border-radius: 50px; z-index: 500;
    display: none; border: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
  }

  /* RING */
  #ring {
    position: fixed; border-radius: 50%;
    border: 2px solid var(--red);
    pointer-events: none; z-index: 300;
    opacity: 0; transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<div id="landing">
  <div class="logo">SHAT<span>TER</span></div>
  <p class="tagline">Take a screenshot of anything — your lock screen, home screen, any app — then watch it shatter.</p>

  <div id="upload-zone">
    <input type="file" id="file-input" accept="image/*">
    <div class="icon">📸</div>
    <div class="label">Upload Your Screenshot</div>
    <div class="sub">Take a screenshot first,<br>then tap here to pick it from gallery</div>
  </div>

  <p class="hint-bottom">Works 100% offline · No internet needed<br>Shake · Tap · Pinch · Tilt to interact</p>
</div>

<canvas id="physics-canvas"></canvas>

<div id="hud">
  <button class="hud-btn red" id="explodeBtn">💥 Boom</button>
  <button class="hud-btn"     id="gravBtn">🌀 Gravity</button>
  <button class="hud-btn"     id="resetBtn">🔄 New</button>
</div>

<div id="flash"></div>
<div id="toast"></div>
<div id="ring"></div>

<script>
const canvas    = document.getElementById('physics-canvas');
const ctx       = canvas.getContext('2d');
const landing   = document.getElementById('landing');
const hud       = document.getElementById('hud');
const flash     = document.getElementById('flash');
const toast     = document.getElementById('toast');
const ring      = document.getElementById('ring');
const fileInput = document.getElementById('file-input');

let engine, world, runner, animFrame;
let shards = [], walls = [];
let capturedImage = null;
let gravMode = 0;
let lastShakeTime = 0;
let lastAcc = { x:0, y:0, z:0 };
let pinchStartDist = 0, pinchMidX = 0, pinchMidY = 0;
let activeTouches = {};

const COLS = 9, ROWS = 16;
const BOUNCE = 0.48, FRICT = 0.05, AIRFRICT = 0.009;

// ── TOAST ──
let toastTimer;
function showToast(msg, ms=1800) {
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.style.display='none', ms);
}

// ── FILE UPLOAD ──
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  showToast('Loading…', 1000);
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { capturedImage = img; triggerShatter(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── SHATTER ──
function triggerShatter() {
  flash.style.transition = 'none';
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.transition='opacity 0.18s'; flash.style.opacity='0'; }, 80);

  landing.style.display = 'none';
  canvas.style.display  = 'block';
  hud.style.display     = 'flex';

  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  initPhysics();
  createShards();
  if (animFrame) cancelAnimationFrame(animFrame);
  renderLoop();
  setupTouch();
  setupMotion();
  setupButtons();
  showToast('💥 Tap shards · Shake · Pinch · Tilt!', 3500);
}

// ── PHYSICS ──
function initPhysics() {
  if (runner) Matter.Runner.stop(runner);
  if (engine) Matter.Engine.clear(engine);
  engine = Matter.Engine.create({ gravity: { x:0, y:1.2 } });
  world  = engine.world;
  runner = Matter.Runner.create();
  Matter.Runner.run(runner, engine);
  buildWalls();
}

function buildWalls() {
  walls.forEach(w => Matter.World.remove(world, w));
  walls = [];
  const W=canvas.width, H=canvas.height, T=80;
  const o = { isStatic:true, restitution:BOUNCE, friction:FRICT };
  walls = [
    Matter.Bodies.rectangle(W/2, H+T/2,  W+200, T, o),
    Matter.Bodies.rectangle(W/2, -T/2,   W+200, T, o),
    Matter.Bodies.rectangle(-T/2,  H/2,  T, H+200, o),
    Matter.Bodies.rectangle(W+T/2, H/2,  T, H+200, o),
  ];
  Matter.World.add(world, walls);
}

// ── SHARDS ──
function createShards() {
  shards.forEach(s => Matter.World.remove(world, s.body));
  shards = [];
  const W=canvas.width, H=canvas.height;
  const sw=W/COLS, sh=H/ROWS;

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cx = c*sw + sw/2;
      const cy = r*sh + sh/2;
      const verts = makeVerts(sw, sh);
      let body;
      try {
        body = Matter.Bodies.fromVertices(cx, cy, verts, {
          restitution:BOUNCE, friction:FRICT, frictionAir:AIRFRICT, density:0.0015
        }, true);
      } catch(e) {
        body = Matter.Bodies.rectangle(cx, cy, sw*0.9, sh*0.9, {
          restitution:BOUNCE, friction:FRICT, frictionAir:AIRFRICT, density:0.0015
        });
      }
      Matter.Body.setVelocity(body, { x:(Math.random()-.5)*1.5, y:(Math.random()-.5)*1.5 });
      Matter.Body.setAngularVelocity(body, (Math.random()-.5)*0.08);
      Matter.World.add(world, body);
      shards.push({ body, srcX:c*sw, srcY:r*sh, srcW:sw, srcH:sh });
    }
  }
}

function makeVerts(w, h) {
  const hw=w/2, hh=h/2;
  const corners=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
  const v=[];
  corners.forEach(([bx,by],i) => {
    v.push({ x:bx+(Math.random()-.5)*w*.22, y:by+(Math.random()-.5)*h*.22 });
    if (Math.random()>.35) {
      const [nx,ny]=corners[(i+1)%4];
      v.push({ x:(bx+nx)/2+(Math.random()-.5)*w*.28, y:(by+ny)/2+(Math.random()-.5)*h*.28 });
    }
  });
  return v;
}

// ── RENDER ──
function renderLoop() {
  animFrame = requestAnimationFrame(renderLoop);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#060606';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const W=canvas.width, H=canvas.height;

  shards.forEach(s => {
    const b=s.body, pos=b.position, ang=b.angle, verts=b.vertices;
    ctx.save();

    // Clip to physics polygon
    ctx.beginPath();
    verts.forEach((v,i) => i===0 ? ctx.moveTo(v.x,v.y) : ctx.lineTo(v.x,v.y));
    ctx.closePath();
    ctx.clip();

    ctx.translate(pos.x, pos.y);
    ctx.rotate(ang);

    if (capturedImage) {
      const scaleX = capturedImage.width  / W;
      const scaleY = capturedImage.height / H;
      ctx.drawImage(
        capturedImage,
        s.srcX*scaleX, s.srcY*scaleY, s.srcW*scaleX, s.srcH*scaleY,
        -s.srcW/2, -s.srcH/2, s.srcW, s.srcH
      );
    }

    // Crack edge
    ctx.strokeStyle = 'rgba(255,255,255,0.38)';
    ctx.lineWidth   = 1.2;
    ctx.beginPath();
    verts.forEach((v,i) => {
      const lx=v.x-pos.x, ly=v.y-pos.y;
      i===0 ? ctx.moveTo(lx,ly) : ctx.lineTo(lx,ly);
    });
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  });
}

// ── TOUCH ──
function setupTouch() {
  canvas.addEventListener('touchstart', onTS, { passive:false });
  canvas.addEventListener('touchmove',  onTM, { passive:false });
  canvas.addEventListener('touchend',   onTE, { passive:false });
}

function onTS(e) {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    activeTouches[t.identifier] = { x:t.clientX, y:t.clientY, t:Date.now() };
  });
  if (e.touches.length===2) {
    const [a,b]=e.touches;
    pinchStartDist = Math.hypot(b.clientX-a.clientX, b.clientY-a.clientY);
    pinchMidX=(a.clientX+b.clientX)/2;
    pinchMidY=(a.clientY+b.clientY)/2;
  }
}

function onTM(e) {
  e.preventDefault();
  if (e.touches.length===2) {
    const [a,b]=e.touches;
    const d=Math.hypot(b.clientX-a.clientX, b.clientY-a.clientY);
    if (pinchStartDist>10 && d<pinchStartDist*0.78) {
      explodeAt((a.clientX+b.clientX)/2, (a.clientY+b.clientY)/2, 22);
      pinchStartDist=d;
      showToast('🤏 Pinch explosion!', 700);
    }
  }
}

function onTE(e) {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    const s=activeTouches[t.identifier];
    if (!s) return;
    const dist=Math.hypot(t.clientX-s.x, t.clientY-s.y);
    const dt=Date.now()-s.t;
    if (dist<18 && dt<280 && e.touches.length===0) flingAt(t.clientX, t.clientY);
    delete activeTouches[t.identifier];
  });
}

function flingAt(x, y) {
  let nearest=null, minD=Infinity;
  shards.forEach(s => {
    const d=Math.hypot(s.body.position.x-x, s.body.position.y-y);
    if (d<minD){ minD=d; nearest=s; }
  });
  if (nearest && minD<150) {
    const angle=Math.atan2(nearest.body.position.y-y, nearest.body.position.x-x);
    Matter.Body.applyForce(nearest.body, nearest.body.position, {
      x: Math.cos(angle)*(0.09+Math.random()*.04),
      y: Math.sin(angle)*(0.09+Math.random()*.04)
    });
    Matter.Body.setAngularVelocity(nearest.body, (Math.random()-.5)*0.5);
  }
}

function explodeAt(x, y, strength=18) {
  shards.forEach(s => {
    const dx=s.body.position.x-x, dy=s.body.position.y-y;
    const dist=Math.hypot(dx,dy)||1;
    const power=(strength/dist)*0.018;
    Matter.Body.applyForce(s.body, s.body.position, { x:(dx/dist)*power, y:(dy/dist)*power });
    Matter.Body.setAngularVelocity(s.body, (Math.random()-.5)*0.6);
  });

  ring.style.transition='none';
  ring.style.width='10px'; ring.style.height='10px';
  ring.style.left=x+'px'; ring.style.top=y+'px';
  ring.style.opacity='0.9';
  ring.style.marginLeft='-5px'; ring.style.marginTop='-5px';
  requestAnimationFrame(()=>{
    ring.style.transition='all 0.55s ease-out';
    ring.style.width='280px'; ring.style.height='280px';
    ring.style.marginLeft='-140px'; ring.style.marginTop='-140px';
    ring.style.opacity='0';
  });
}

// ── MOTION ──
function setupMotion() {
  const attach=()=>{
    window.addEventListener('devicemotion',      onMotion);
    window.addEventListener('deviceorientation', onOrient);
  };
  if (typeof DeviceMotionEvent!=='undefined' &&
      typeof DeviceMotionEvent.requestPermission==='function') {
    DeviceMotionEvent.requestPermission().then(r=>{ if(r==='granted') attach(); }).catch(()=>{});
  } else { attach(); }
}

function onMotion(e) {
  const a=e.accelerationIncludingGravity; if(!a) return;
  const dx=Math.abs((a.x||0)-lastAcc.x);
  const dy=Math.abs((a.y||0)-lastAcc.y);
  const dz=Math.abs((a.z||0)-lastAcc.z);
  if (dx+dy+dz>28 && Date.now()-lastShakeTime>900) {
    lastShakeTime=Date.now();
    explodeAt(canvas.width/2, canvas.height/2, 32);
    shards.forEach(s=>{
      Matter.Body.applyForce(s.body, s.body.position, {
        x:(Math.random()-.5)*0.07, y:(Math.random()-.5)*0.07
      });
    });
    showToast('📳 SHAKE EXPLOSION!', 900);
  }
  lastAcc={ x:a.x||0, y:a.y||0, z:a.z||0 };
}

function onOrient(e) {
  if (gravMode!==0) return;
  const beta =(e.beta ||0)*Math.PI/180;
  const gamma=(e.gamma||0)*Math.PI/180;
  engine.gravity.x=Math.max(-2.5,Math.min(2.5,Math.sin(gamma)*2.5));
  engine.gravity.y=Math.max(-2.5,Math.min(2.5,Math.sin(beta) *2.5));
}

// ── BUTTONS ──
function setupButtons() {
  document.getElementById('explodeBtn').onclick=()=>{
    explodeAt(canvas.width/2, canvas.height/2, 35);
    showToast('💥 BOOM!',700);
  };

  document.getElementById('gravBtn').onclick=()=>{
    const modes=[
      {x:0,   y:1.5, label:'⬇️ Down'},
      {x:-1.5,y:0,   label:'⬅️ Left'},
      {x:0,   y:-1.5,label:'⬆️ Up'},
      {x:1.5, y:0,   label:'➡️ Right'},
      {x:0,   y:0,   label:'🌀 Zero G'},
    ];
    gravMode=(gravMode+1)%modes.length;
    const m=modes[gravMode];
    engine.gravity.x=m.x; engine.gravity.y=m.y;
    buildWalls();
    showToast(m.label, 900);
  };

  document.getElementById('resetBtn').onclick=()=>{
    canvas.style.display='none';
    hud.style.display='none';
    landing.style.display='flex';
    fileInput.value='';
    gravMode=0;
    if(runner) Matter.Runner.stop(runner);
    if(animFrame) cancelAnimationFrame(animFrame);
  };
}

window.addEventListener('resize',()=>{
  if(canvas.style.display==='none') return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  buildWalls();
  if(capturedImage) createShards();
});
</script>
</body>
</html>
